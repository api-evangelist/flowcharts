aid: flowcharts
name: Flowcharts
description: >-
  Flowcharts are a visual modeling technique used across software engineering,
  systems analysis, business process design, and education to depict the
  steps, decisions, and flow of a process or algorithm. Within an API
  context, flowcharts are used to model workflows, integration patterns,
  retry logic, authentication flows, and the orchestration of services. This
  topic indexes the standards, notations, libraries, and rendering tools
  that practitioners use to create and exchange flowcharts as part of API
  documentation, design, and operations.
